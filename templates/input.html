{% extends "layout.html" %}
{% block title %}Form patterns · Smart Trolley{% endblock %}
{% block content %}
<section class="page-wrap"><header class="page-header"><div><span class="page-kicker"><i></i> Input system</span><h1>Form controls.</h1><p>Accessible fields and choices used throughout the retail terminal.</p></div></header><article class="surface-card"><header class="surface-card__head"><div><span>Component preview</span><h2>Operator configuration</h2></div></header><div class="surface-card__body"><form class="form-grid">
<div class="form-field"><label for="demo-name">Operator name</label><input id="demo-name" placeholder="Full name"></div><div class="form-field"><label for="demo-email">Email address</label><input id="demo-email" type="email" placeholder="operator@example.com"></div>
<div class="form-field form-field--full"><label for="demo-comment">System note</label><textarea id="demo-comment" placeholder="Add deployment context"></textarea></div>
<div class="form-field form-field--full"><label>Inference mode</label><div class="choice-row"><label><input type="radio" name="mode" checked> Balanced</label><label><input type="radio" name="mode"> Accuracy</label><label><input type="radio" name="mode"> Performance</label></div></div>
<div class="form-field form-field--full"><label for="demo-select">Camera source</label><select id="demo-select"><option>Integrated camera</option><option>ESP32 stream</option><option>Uploaded image</option></select></div>
<div class="form-field form-field--full"><button class="ui-button" type="button">Save configuration</button></div>
</form></div></article></section>
{% endblock %}
